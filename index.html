<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu tuyển sinh - PTDTNT THPT Mường Nhé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-success">
                <div class="card-header bg-success text-white text-center py-3">
                    <h4 class="mb-1 text-uppercase">Hệ thống tra cứu danh sách trúng tuyển</h4>
                    <h5 class="mb-0">Trường PTDTNT THPT Mường Nhé - Năm học 2026-2027</h5>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nhập Số Báo Danh (SBD) của thí sinh:</label>
                        <input type="text" class="form-control form-control-lg" id="inputSBD" placeholder="Ví dụ: 001, 123..." onkeypress="if(event.key === 'Enter') traCuu()">
                    </div>
                    <button onclick="traCuu()" class="btn btn-primary btn-lg w-100 fw-bold" id="btnTraCuu">
                        Tra Cứu Kết Quả
                    </button>

                    <div id="ketQua" class="mt-4"></div>
                </div>
                <div class="card-footer text-center text-muted small">
                    Dữ liệu được cập nhật trực tiếp từ Ban tuyển sinh nhà trường
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========================================================
    // CHỈ CẦN THAY ĐỔI DÒNG NÀY: Dán ID Bảng tính Google của bạn vào đây
    // ========================================================
    // CHỈ CẦN THAY ĐỔI DÒNG NÀY:
    const GOOGLE_SHEET_ID = '1rG-q3y4utwTLaIFUZ6q-vXuf51Oo48tdCNIbQil0oyE';
    // ========================================================

    const URL_TRUNG_TUYEN = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=TrungTuyen`;
    const URL_KHONG_TRUNG_TUYEN = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=KhongTrungTuyen`;

    async function layDuLieuTuGoogleSheet(url) {
        return new Promise((resolve, reject) => {
            Papa.parse(url, {
                download: true,
                header: true,
                complete: function(results) {
                    resolve(results.data);
                },
                error: function(error) {
                    resolve([]); // Trả về rỗng nếu có lỗi (ví dụ trang tính chưa có chữ nào)
                }
            });
        });
    }

    async function traCuu() {
        const sbd = document.getElementById("inputSBD").value.trim().toLowerCase();
        const ketQuaDiv = document.getElementById("ketQua");
        const btnTraCuu = document.getElementById("btnTraCuu");

        if (!sbd) {
            ketQuaDiv.innerHTML = `<div class="alert alert-danger">Vui lòng nhập Số báo danh!</div>`;
            return;
        }

        if (GOOGLE_SHEET_ID === 'DÁN_ID_BẢNG_TÍNH_CỦA_BẠN_VÀO_ĐÂY') {
            ketQuaDiv.innerHTML = `<div class="alert alert-danger">Hệ thống chưa được kết nối với Google Sheets. Xin vui lòng liên hệ Admin.</div>`;
            return;
        }

        // Hiển thị trạng thái đang tải
        ketQuaDiv.innerHTML = `<div class="text-center text-primary"><div class="spinner-border" role="status"></div><p class="mt-2">Đang tìm dữ liệu, vui lòng chờ...</p></div>`;
        btnTraCuu.disabled = true;

        try {
            // Tải dữ liệu từ 2 sheet cùng lúc
            const [dataTrungTuyen, dataKhongTrungTuyen] = await Promise.all([
                layDuLieuTuGoogleSheet(URL_TRUNG_TUYEN),
                layDuLieuTuGoogleSheet(URL_KHONG_TRUNG_TUYEN)
            ]);

            // Tìm trong danh sách trúng tuyển
            let index = dataTrungTuyen.findIndex(hs => hs['SBD'] && String(hs['SBD']).trim().toLowerCase() === sbd);
            
            if (index !== -1) {
                const hs = dataTrungTuyen[index];
                // Tính tổng số lượng trúng tuyển (bỏ qua các dòng trống)
                const tongSo = dataTrungTuyen.filter(item => item['SBD']).length;
                const thuTu = index + 1;

                ketQuaDiv.innerHTML = `
                    <div class="alert alert-success text-center shadow-sm">
                        <h5 class="fw-bold mb-0 text-uppercase">Chúc mừng bạn trúng tuyển</h5>
                        <p class="mb-0 mt-1">Trường PTDTNT THPT Mường Nhé - Năm học 2026-2027</p>
                    </div>
                    <table class="table table-bordered mt-3 bg-white">
                        <tbody>
                            <tr><th style="width: 40%;" class="bg-light">Thứ tự</th><td><span class="badge bg-success fs-6">${thuTu} / ${tongSo}</span></td></tr>
                            <tr><th class="bg-light">Họ tên thí sinh</th><td class="fw-bold text-primary fs-5">${hs['Họ tên thí sinh'] || ''}</td></tr>
                            <tr><th class="bg-light">Ngày tháng năm sinh</th><td>${hs['Ngày tháng năm sinh'] || ''}</td></tr>
                            <tr><th class="bg-light">Dân tộc</th><td>${hs['Dân tộc'] || ''}</td></tr>
                            <tr><th class="bg-light">Giới tính</th><td>${hs['Giới tính'] || ''}</td></tr>
                            <tr><th class="bg-light">Trường THCS</th><td>${hs['Trường THCS'] || ''}</td></tr>
                            <tr><th class="bg-light">Địa chỉ thường trú</th><td>${hs['Địa chỉ thường trú'] || ''}</td></tr>
                        </tbody>
                    </table>`;
                btnTraCuu.disabled = false;
                return;
            }

            // Tìm trong danh sách không trúng tuyển
            let failIndex = dataKhongTrungTuyen.findIndex(hs => hs['SBD'] && String(hs['SBD']).trim().toLowerCase() === sbd);
            
            if (failIndex !== -1) {
                const hs = dataKhongTrungTuyen[failIndex];
                ketQuaDiv.innerHTML = `
                    <div class="alert alert-warning text-center shadow-sm">
                        <h5 class="mb-0">Rất tiếc, bạn không trúng tuyển trong kỳ thi này.</h5>
                        <p class="mt-2 mb-0">Họ tên: <strong>${hs['Họ tên thí sinh'] || ''}</strong></p>
                    </div>`;
                btnTraCuu.disabled = false;
                return;
            }

            // Không tìm thấy
            ketQuaDiv.innerHTML = `<div class="alert alert-danger">Không tìm thấy Số báo danh này trong hệ thống. Vui lòng kiểm tra lại!</div>`;

        } catch (error) {
            ketQuaDiv.innerHTML = `<div class="alert alert-danger">Lỗi kết nối mạng hoặc dữ liệu chưa được công khai.</div>`;
        }
        
        btnTraCuu.disabled = false;
    }
</script>
</body>
</html>
